<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platformer Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }
        canvas {
            background: lightblue;
            display: block;
            margin: auto;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 800;
        canvas.height = 400;

        // Game variables
        let score = 0;
        const gravity = 0.5;

        // Character setup
        let squirrel = {
            x: 50,
            y: canvas.height - 70,
            width: 50,
            height: 50,
            dy: 0,
            jumping: false,
            doubleJump: false,
        };

        // Platform setup
        let platforms = [];
        platforms.push({ x: 0, y: canvas.height - 10, width: canvas.width, height: 10 }); // ground platform
        
        // Game mechanics
        function jump() {
            if (!squirrel.jumping) {
                squirrel.dy = -10;
                squirrel.jumping = true;
            } else if (!squirrel.doubleJump) {
                squirrel.dy = -10;
                squirrel.doubleJump = true;
            }
        }

        function update() {
            squirrel.dy += gravity;
            squirrel.y += squirrel.dy;

            // Collision with the ground
            if (squirrel.y + squirrel.height >= canvas.height) {
                squirrel.y = canvas.height - squirrel.height;
                squirrel.jumping = false;
                squirrel.doubleJump = false;
                squirrel.dy = 0;
            }

            // Draw
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'green';
            ctx.fillRect(squirrel.x, squirrel.y, squirrel.width, squirrel.height);
            platforms.forEach(p => {
                ctx.fillRect(p.x, p.y, p.width, p.height);
            });

            requestAnimationFrame(update);
        }

        // Key event listeners
        window.addEventListener('keydown', function (e) {
            if (e.key === 'ArrowUp') {
                jump();
            }
        });

        update();
    </script>
</body>
</html>
