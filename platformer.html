<!DOCTYPE html>\n<html lang='en'>\n<head>\n    <meta charset='UTF-8'>\n    <meta name='viewport' content='width=device-width, initial-scale=1.0'>\n    <title>8-Bit Platformer</title>\n    <style>\n        body { margin: 0; background: #87CEFA; }\n        canvas { display: block; margin: 0 auto; background: #87CEFA; }\n    </style>\n</head>\n<body>\n<canvas id='gameCanvas' width='800' height='600'></canvas>\n<script>\nconst canvas = document.getElementById('gameCanvas');\nconst ctx = canvas.getContext('2d');\n\n// Game Variables\nconst player = { x: 50, y: 540, width: 32, height: 32, color: 'blue', gravity: 1, jumpStrength: 15, dy: 0, jumping: false };\nconst keys = { right: false, left: false, up: false };\nlet score = 0;\nlet lives = 3;\n\n// Game Functions\nfunction drawPlayer() {\n    ctx.fillStyle = player.color;\n    ctx.fillRect(player.x, player.y, player.width, player.height);\n}\n\nfunction update() {\n    ctx.clearRect(0, 0, canvas.width, canvas.height);\n    drawPlayer();\n    // Movement controls\n    if (keys.right) player.x += 5;\n    if (keys.left) player.x -= 5;\n    if (keys.up && !player.jumping) {\n        player.dy = -player.jumpStrength;\n        player.jumping = true;\n    }\n    // Gravity\n    player.dy += player.gravity;\n    player.y += player.dy;\n    if (player.y + player.height > canvas.height) {\n        player.y = canvas.height - player.height;\n        player.dy = 0;\n        player.jumping = false;\n    }\n    requestAnimationFrame(update);\n}\n\nfunction keyDown(e) {\n    if (e.key === 'ArrowRight') keys.right = true;\n    if (e.key === 'ArrowLeft') keys.left = true;\n    if (e.key === 'ArrowUp') keys.up = true;\n}\n\nfunction keyUp(e) {\n    if (e.key === 'ArrowRight') keys.right = false;\n    if (e.key === 'ArrowLeft') keys.left = false;\n    if (e.key === 'ArrowUp') keys.up = false;\n}\n\ndocument.addEventListener('keydown', keyDown);\ndocument.addEventListener('keyup', keyUp);\nupdate();\n</script>\n</body>\n</html>
