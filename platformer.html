<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8-Bit Platformer</title>
    <style>
        body { margin: 0; background: #87CEFA; font-family: Arial; }
        canvas { display: block; margin: 0 auto; background: #87CEFA; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; font-size: 18px; }
    </style>
</head>
<body>
<div id="ui">
    <div>Lives: <span id="lives">3</span></div>
    <div>Score: <span id="score">0</span></div>
</div>
<canvas id="gameCanvas" width="800" height="600"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const player = {
    x: 50,
    y: 540,
    width: 32,
    height: 32,
    color: 'blue',
    gravity: 0.8,
    jumpPower: 15,
    dy: 0,
    jumping: false,
    doubleJump: true,
    dashCooldown: 0,
    canDash: true,
    onGround: false
};

const keys = { right: false, left: false, up: false, space: false };
let score = 0;
let lives = 3;
let gameOver = false;

const platforms = [
    { x: 0, y: 580, width: 800, height: 20, color: '#8B4513' }
];

const enemies = [
    { x: 150, y: 520, width: 32, height: 32, speed: 2, direction: 1, color: '#FF6347' },
    { x: 400, y: 450, width: 32, height: 32, speed: 1.5, direction: -1, color: '#FF6347' }
];

const coins = [
    { x: 100, y: 500, width: 16, height: 16, collected: false, color: '#FFD700' },
    { x: 300, y: 400, width: 16, height: 16, collected: false, color: '#FFD700' },
    { x: 600, y: 350, width: 16, height: 16, collected: false, color: '#FFD700' }
];

const spikes = [
    { x: 500, y: 550, width: 40, height: 20, color: '#FF0000' }
];

const flag = { x: 750, y: 500, width: 40, height: 60, color: '#00FF00' };

function drawRect(x, y, w, h, color) {
    ctx.fillStyle = color;
    ctx.fillRect(x, y, w, h);
}

function drawPlayer() {
    drawRect(player.x, player.y, player.width, player.height, player.color);
}

function drawPlatforms() {
    platforms.forEach(p => drawRect(p.x, p.y, p.width, p.height, p.color));
}

function drawEnemies() {
    enemies.forEach(e => drawRect(e.x, e.y, e.width, e.height, e.color));
}

function drawCoins() {
    coins.forEach(c => {
        if (!c.collected) drawRect(c.x, c.y, c.width, c.height, c.color);
    });
}

function drawSpikes() {
    spikes.forEach(s => drawRect(s.x, s.y, s.width, s.height, s.color));
}

function drawFlag() {
    drawRect(flag.x, flag.y, flag.width, flag.height, flag.color);
}

function checkCollision(rect1, rect2) {
    return rect1.x < rect2.x + rect2.width &&
           rect1.x + rect1.width > rect2.x &&
           rect1.y < rect2.y + rect2.height &&
           rect1.y + rect1.height > rect2.y;
}

function update() {
    if (gameOver) return;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Movement
    if (keys.right) player.x += 5;
    if (keys.left) player.x -= 5;

    // Jump
    if (keys.up && !player.jumping) {
        player.dy = -player.jumpPower;
        player.jumping = true;
        player.doubleJump = true;
    } else if (keys.space && player.doubleJump && player.jumping) {
        player.dy = -player.jumpPower * 0.8;
        player.doubleJump = false;
    }

    // Dash
    if (keys.space && player.canDash && player.dashCooldown === 0) {
        player.x += 50;
        player.canDash = false;
        player.dashCooldown = 30;
    }

    if (player.dashCooldown > 0) player.dashCooldown--;

    // Gravity
    player.dy += player.gravity;
    player.y += player.dy;

    // Platform collision
    player.onGround = false;
    platforms.forEach(p => {
        if (checkCollision(player, p) && player.dy >= 0) {
            player.y = p.y - player.height;
            player.dy = 0;
            player.jumping = false;
            player.onGround = true;
            player.canDash = true;
        }
    });

    // Enemy movement and collision
    enemies.forEach(e => {
        e.x += e.speed * e.direction;
        if (e.x <= 0 || e.x + e.width >= canvas.width) e.direction *= -1;

        if (checkCollision(player, e)) {
            if (player.dy > 0 && player.y + player.height - e.y < 16) {
                score += 10;
                e.x = Math.random() * (canvas.width - e.width);
            } else {
                lives--;
                player.x = 50;
                player.y = 540;
            }
        }
    });

    // Coin collection
    coins.forEach(c => {
        if (!c.collected && checkCollision(player, c)) {
            c.collected = true;
            score += 5;
        }
    });

    // Spike collision
    spikes.forEach(s => {
        if (checkCollision(player, s)) {
            lives--;
            player.x = 50;
            player.y = 540;
        }
    });

    // Flag collision (win condition)
    if (checkCollision(player, flag)) {
        score += 100;
        gameOver = true;
        ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = 'white';
        ctx.font = '40px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('LEVEL COMPLETE!', canvas.width / 2, canvas.height / 2);
    }

    // Game over check
    if (lives <= 0) {
        gameOver = true;
        ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = 'white';
        ctx.font = '40px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2);
    }

    // Boundary check
    if (player.x < 0) player.x = 0;
    if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;
    if (player.y > canvas.height) {
        lives--;
        player.x = 50;
        player.y = 540;
    }

    // Draw everything
    drawPlatforms();
    drawEnemies();
    drawCoins();
    drawSpikes();
    drawFlag();
    drawPlayer();

    document.getElementById('lives').textContent = lives;
    document.getElementById('score').textContent = score;

    requestAnimationFrame(update);
}

document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight') keys.right = true;
    if (e.key === 'ArrowLeft') keys.left = true;
    if (e.key === 'ArrowUp') keys.up = true;
    if (e.key === ' ') keys.space = true;
});

document.addEventListener('keyup', (e) => {
    if (e.key === 'ArrowRight') keys.right = false;
    if (e.key === 'ArrowLeft') keys.left = false;
    if (e.key === 'ArrowUp') keys.up = false;
    if (e.key === ' ') keys.space = false;
});

update();
</script>
</body>
</html>
